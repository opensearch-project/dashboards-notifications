                  - statusCode
                  - body
  /api/notifications/delete_configs:
    delete:
      operationId: deleteConfigs
      summary: Delete notification configs
      parameters:
        - schema:
            type: string
            minLength: 1
            description: Unique identifier for the datasource
          required: false
          description: Unique identifier for the datasource
          name: dataSourceId
          in: query
        - schema:
            anyOf:
              - type: array
                items:
                  type: string
                  minLength: 1
                  description: Unique identifier for the notification config
                minItems: 1
              - type: string
                minLength: 1
                description: Unique identifier for the notification config
            description: One or more notification config IDs
          required: true
          description: One or more notification config IDs
          name: config_id_list
          in: query
      responses:
        "200":
          description: Configs deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  delete_response_list:
                    type: object
                    additionalProperties:
                      type: string
                    description: Map of config ID to deletion status (e.g. "OK")
                required:
                  - delete_response_list
                description: Delete configs response
                example:
                  delete_response_list:
                    sample-config-id: OK
        "500":
          description: Internal server error
          content:
