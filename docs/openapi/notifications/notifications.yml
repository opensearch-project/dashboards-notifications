            schema:
              type: object
              properties:
                config_id:
                  type: string
                  description: Custom config ID (auto-generated if omitted)
                config:
                  type: object
                  properties:
                    name:
                      type: string
                      minLength: 1
                      description: Name of the notification channel
                    description:
                      type: string
                      description: Description of the notification channel
                    config_type:
                      type: string
                      enum:
                        - slack
                        - chime
                        - webhook
                        - email
                        - sns
                        - ses_account
                        - smtp_account
                        - email_group
                        - microsoft_teams
                      description: Notification channel type
                    is_enabled:
                      type: boolean
                      description: Whether the channel is enabled
                    slack:
                      type: object
                      properties:
                        url:
                          type: string
                          format: uri
                      required:
                        - url
                    chime:
                      type: object
                      properties:
                        url:
                          type: string
                          format: uri
                      required:
                        - url
                    webhook:
                      type: object
                      properties:
                        url:
                          type: string
                          format: uri
                      required:
                        - url
                    microsoft_teams:
                      type: object
                      properties:
                        url:
                          type: string
                          format: uri
                      required:
                        - url
                    sns:
                      type: object
                      properties:
                        topic_arn:
                          type: string
                          pattern: ^arn:aws[a-zA-Z-]*:[a-zA-Z0-9-]+:[a-z0-9-]*:\d{12}:.+$
                          description: SNS topic ARN
                        role_arn:
                          type: string
                          pattern: ^arn:aws[a-zA-Z-]*:[a-zA-Z0-9-]+:[a-z0-9-]*:\d{12}:.+$
                          description: IAM role ARN
                      required:
                        - topic_arn
                    smtp_account:
                      type: object
                      properties:
                        host:
                          type: string
                          minLength: 1
                          description: SMTP server hostname
                        port:
                          type: integer
                          minimum: 1
                          maximum: 65535
                        method:
                          type: string
                          description: Encryption method, e.g. "start_tls", "ssl", "none"
                        from_address:
                          type: string
                          format: email
                          description: Sender email address
                      required:
                        - host
                        - port
                        - method
                        - from_address
                    ses_account:
                      type: object
                      properties:
                        region:
                          type: string
                          pattern: ^[a-z]{2}(-[a-z]+)+-\d+$
                          description: AWS region, e.g. "us-west-2"
                        role_arn:
                          type: string
                          pattern: ^arn:aws[a-zA-Z-]*:[a-zA-Z0-9-]+:[a-z0-9-]*:\d{12}:.+$
                          description: IAM role ARN
                        from_address:
                          type: string
                          format: email
                          description: Sender email address
                      required:
                        - region
                        - from_address
                    email_group:
                      type: object
                      properties:
                        recipient_list:
                          type: array
                          items:
                            type: object
                            properties:
                              recipient:
                                type: string
                            required:
                              - recipient
                      required:
