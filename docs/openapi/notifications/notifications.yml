openapi: 3.0.0
info:
  title: OpenSearch Dashboards Notifications APIs
  description: OpenAPI spec for OpenSearch Dashboards Notifications plugin APIs
  termsOfService: https://lfprojects.org/policies/terms-of-use/
  contact:
    name: OpenSearch Dashboards
    url: https://opensearch.org
    email: opensearch@amazon.com
  license:
    name: Apache v2.0 License
    url: https://www.apache.org/licenses/LICENSE-2.0
  version: 3.1.0
servers:
  - url: http://localhost:5601
externalDocs:
  description: Official documentation
  url: https://docs.opensearch.org/latest/about
components:
  schemas: {}
  parameters: {}
paths:
  /api/notifications/get_configs:
    get:
      operationId: getConfigs
      summary: Get notification configs
      parameters:
        - schema:
            type: string
            minLength: 1
            description: Unique identifier for the datasource
          required: false
          description: Unique identifier for the datasource
          name: dataSourceId
          in: query
        - schema:
            type: integer
            minimum: 0
            description: Starting index for pagination
          required: true
          description: Starting index for pagination
          name: from_index
          in: query
        - schema:
            type: integer
            minimum: 0
            maximum: 10000
            description: Maximum number of results to return
          required: true
          description: Maximum number of results to return
          name: max_items
          in: query
        - schema:
            type: string
            description: Search query string
          required: false
          description: Search query string
          name: query
          in: query
        - schema:
            anyOf:
              - type: array
                items:
                  type: string
              - type: string
            description: "Filter by config type(s): slack, chime, webhook, email, sns,
              ses_account, smtp_account, email_group, microsoft_teams"
          required: true
          description: "Filter by config type(s): slack, chime, webhook, email, sns,
            ses_account, smtp_account, email_group, microsoft_teams"
          name: config_type
          in: query
        - schema:
            type: boolean
            description: Filter by enabled status
          required: false
          description: Filter by enabled status
          name: is_enabled
          in: query
        - schema:
            type: string
            description: Field to sort results by
          required: false
          description: Field to sort results by
          name: sort_field
          in: query
        - schema:
            type: string
            enum:
              - asc
              - desc
            description: Sort order
          required: false
          description: Sort order
          name: sort_order
          in: query
        - schema:
            anyOf:
              - type: array
                items:
                  type: string
                  minLength: 1
                  description: Unique identifier for the notification config
                minItems: 1
              - type: string
                minLength: 1
                description: Unique identifier for the notification config
            description: One or more notification config IDs
          required: false
          description: One or more notification config IDs
          name: config_id_list
          in: query
        - schema:
            anyOf:
              - type: array
                items:
                  type: string
              - type: string
            description: Filter by SMTP method (e.g. "start_tls", "ssl", "none")
          required: false
          description: Filter by SMTP method (e.g. "start_tls", "ssl", "none")
          name: smtp_account.method
          in: query
      responses:
        "200":
          description: Configs retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  start_index:
                    type: integer
                    minimum: 0
                  total_hits:
                    type: integer
                    minimum: 0
                  total_hit_relation:
                    type: string
                  config_list:
                    type: array
                    items:
                      type: object
                      properties:
                        config_id:
                          type: string
                        last_updated_time_ms:
                          type: integer
                          minimum: 0
                          description: Last updated timestamp in milliseconds
                        created_time_ms:
                          type: integer
                          minimum: 0
                          description: Created timestamp in milliseconds
                        config:
                          type: object
                          properties:
                            name:
                              type: string
                              minLength: 1
                              description: Name of the notification channel
                            description:
                              type: string
                              description: Description of the notification channel
                            config_type:
                              type: string
                              enum:
                                - slack
                                - chime
                                - webhook
                                - email
                                - sns
                                - ses_account
                                - smtp_account
                                - email_group
                                - microsoft_teams
                              description: Notification channel type
                            is_enabled:
                              type: boolean
                              description: Whether the channel is enabled
                            slack:
                              type: object
                              properties:
                                url:
                                  type: string
                                  format: uri
                              required:
                                - url
                            chime:
                              type: object
                              properties:
                                url:
                                  type: string
                                  format: uri
                              required:
                                - url
                            webhook:
                              type: object
                              properties:
                                url:
                                  type: string
                                  format: uri
                              required:
                                - url
                            microsoft_teams:
                              type: object
                              properties:
                                url:
                                  type: string
                                  format: uri
                              required:
                                - url
                            sns:
                              type: object
                              properties:
                                topic_arn:
                                  type: string
                                  pattern: ^arn:aws[a-zA-Z-]*:[a-zA-Z0-9-]+:[a-z0-9-]*:\d{12}:.+$
                                  description: SNS topic ARN
                                role_arn:
                                  type: string
                                  pattern: ^arn:aws[a-zA-Z-]*:[a-zA-Z0-9-]+:[a-z0-9-]*:\d{12}:.+$
                                  description: IAM role ARN
                              required:
                                - topic_arn
                            smtp_account:
                              type: object
                              properties:
                                host:
                                  type: string
                                  minLength: 1
                                  description: SMTP server hostname
                                port:
                                  type: integer
                                  minimum: 1
                                  maximum: 65535
                                method:
                                  type: string
                                  description: Encryption method, e.g. "start_tls", "ssl", "none"
                                from_address:
                                  type: string
                                  format: email
                                  description: Sender email address
                              required:
                                - host
                                - port
                                - method
                                - from_address
                            ses_account:
                              type: object
                              properties:
                                region:
                                  type: string
                                  pattern: ^[a-z]{2}(-[a-z]+)+-\d+$
                                  description: AWS region, e.g. "us-west-2"
                                role_arn:
                                  type: string
                                  pattern: ^arn:aws[a-zA-Z-]*:[a-zA-Z0-9-]+:[a-z0-9-]*:\d{12}:.+$
                                  description: IAM role ARN
                                from_address:
                                  type: string
                                  format: email
                                  description: Sender email address
                              required:
                                - region
                                - from_address
                            email_group:
                              type: object
                              properties:
                                recipient_list:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      recipient:
                                        type: string
                                    required:
                                      - recipient
                              required:
                                - recipient_list
                            email:
                              type: object
                              properties:
                                email_account_id:
                                  type: string
                                recipient_list:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      recipient:
                                        type: string
                                    required:
                                      - recipient
                                email_group_id_list:
                                  type: array
                                  items:
                                    type: string
                              required:
                                - email_account_id
                          required:
                            - name
                            - config_type
                          description: Notification channel configuration
                      required:
                        - config_id
                        - last_updated_time_ms
                        - created_time_ms
                        - config
                      description: Notification config with metadata
                required:
                  - start_index
                  - total_hits
                  - total_hit_relation
                  - config_list
                description: Paginated list of notification configs
                example: &a1
                  start_index: 0
                  total_hits: 1
                  total_hit_relation: eq
                  config_list:
                    - config_id: sample-config-id
                      last_updated_time_ms: 1652760532774
                      created_time_ms: 1652760532774
                      config:
                        name: my-slack-channel
                        description: Slack notification channel
                        config_type: slack
                        is_enabled: true
                        slack:
                          url: https://example.com/slack-webhook
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                  body:
                    type: string
                required:
                  - statusCode
                  - body
